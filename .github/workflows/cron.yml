name: Tennis Bot Cron

on:
  schedule:
    # Gira ogni 5 minuti tra le 10:00 e le 10:55 UTC (12:00 - 12:55 italiane)
    - cron: '*/5 10 * * *'
  workflow_dispatch: # Permette di avviarlo a mano per i test

jobs:
  ping-site:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama lo script su Altervista
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/120.0.0.0" \
          "https://fantaranking.altervista.org/check_tennis.php"
