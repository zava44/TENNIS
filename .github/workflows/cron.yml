name: Tennis Bot Cron Ogni Minuto

on:
  schedule:
    - cron: '* * * * *' # Gira ogni singolo minuto
  workflow_dispatch: # Ti permette di farlo partire a mano per testare

jobs:
  ping-site:
    runs-on: ubuntu-latest
    steps:
      - name: Chiama lo script su Altervista
        run: |
          curl -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64)" \
          "https://fantaranking.altervista.org/check_tennis.php"
